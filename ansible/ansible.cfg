[defaults]
# Point to your inventory — override with -i or ANSIBLE_INVENTORY env var
# Example: ANSIBLE_INVENTORY=~/Code/GitHub/PRIVATE/ansible/inventory/hosts.yml
inventory = inventory/hosts.yml

roles_path = roles

remote_user = ansible

forks = 10
pipelining = True

stdout_callback = default
callbacks_enabled = timer, profile_tasks
callback_result_format = yaml

retry_files_enabled = False

vault_password_file = .vault_password

gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_cache
fact_caching_timeout = 86400

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey -o StrictHostKeyChecking=accept-new
control_path_dir = ~/.ansible/cp
