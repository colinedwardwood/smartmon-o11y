---
- name: Restart smartctl-exporter
  ansible.builtin.systemd:
    name: smartctl-exporter.service
    state: restarted
    daemon_reload: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart smartd
  ansible.builtin.systemd:
    name: smartd
    state: restarted
