---
- name: Remove legacy smartctl-exporter systemd drop-in overrides
  ansible.builtin.file:
    path: /etc/systemd/system/smartctl-exporter.service.d
    state: absent
  notify: Reload systemd

- name: Deploy smartctl-exporter systemd service unit
  ansible.builtin.template:
    src: smartctl-exporter.service.j2
    dest: /etc/systemd/system/smartctl-exporter.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart smartctl-exporter

- name: Enable and start smartctl-exporter service
  ansible.builtin.systemd:
    name: smartctl-exporter.service
    enabled: true
    state: started
    daemon_reload: true
