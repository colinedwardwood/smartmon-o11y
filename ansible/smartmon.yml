---
# Smartmontools + smartd configuration
# Installs smartmontools, enables smartd, and configures SMART monitoring.
# Also installs and starts the smartctl_exporter Prometheus exporter.
#
# Usage:
#   ansible-playbook ansible/smartmon.yml

- name: Install and configure smartmontools
  hosts: all:!raspberry_pis
  become: true
  roles:
    - smartmon-exporter
